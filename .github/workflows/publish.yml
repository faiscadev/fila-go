name: Publish

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create dev tag
        run: |
          TAG="v0.1.0-dev.${GITHUB_RUN_NUMBER}"
          git tag "$TAG"
          git push origin "$TAG"
