name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/checkout@v4
        with:
          repository: faiscadev/fila
          path: fila
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            fila/target
            ~/.cargo/registry
            ~/.cargo/git
          key: fila-server-${{ runner.os }}-${{ hashFiles('fila/Cargo.lock') }}
          restore-keys: fila-server-${{ runner.os }}-
      - run: cargo build --release -p fila-server --manifest-path fila/Cargo.toml
      - run: go build ./...
      - run: go vet ./...
      - run: go test -v -count=1 -timeout 120s ./...
        env:
          FILA_SERVER_BIN: ${{ github.workspace }}/fila/target/release/fila-server
